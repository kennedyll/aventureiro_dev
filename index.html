<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Caderno de Campanha — Produtividade RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
</head>
<body style="margin:0;">

<style>
:root{
  --paper:#F2F7FC;
  --card:#FFFFFF;
  --card-soft:#EAF3FB;
  --ink:#1E2D3D;
  --ink-soft:#57708A;
  --ink-faint:#93A7BB;
  --line: rgba(30,45,61,0.09);
  --line-strong: rgba(30,45,61,0.15);

  --estudo:#2E6FA8;    --estudo-bg:#E3EFFA;
  --leitura:#5D6BBE;   --leitura-bg:#EAECFA;
  --boxe:#2E93A6;      --boxe-bg:#E1F3F6;
  --academia:#356089;  --academia-bg:#E3ECF5;
  --corrida:#2F9BCF;   --corrida-bg:#E2F4FC;
  --gold:#2F7FE0;      --gold-bg:#E5F0FE;
  --danger:#C0392B;    --danger-bg:#FBEAE7;

  --radius:16px;
  --radius-sm:10px;
  --shadow-sm: 0 1px 2px rgba(30,45,61,0.06), 0 1px 1px rgba(30,45,61,0.04);
  --shadow-md: 0 6px 18px -8px rgba(30,45,61,0.20), 0 2px 6px -2px rgba(30,45,61,0.10);
}
*{box-sizing:border-box;}
html, body{ height:100%; margin:0; }
body{
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,0.9), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(207,226,247,0.8), transparent 55%),
    linear-gradient(160deg, #C7DBF2 0%, #AFCBE9 55%, #9CBEE3 100%);
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  padding:26px;
  -webkit-tap-highlight-color:transparent;
}
.rpg-root{
  font-family:'Inter', system-ui, sans-serif;
  color:var(--ink);
  background:var(--paper);
  width:100%; max-width:1360px; height:100%; max-height:960px;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  border-radius:26px;
  box-shadow:
    0 50px 100px -30px rgba(15,35,60,0.45),
    0 18px 40px -20px rgba(15,35,60,0.30),
    0 0 0 1px rgba(255,255,255,0.5) inset;
  position:relative;
  transform:translateZ(0);
}
.display{ font-family:'Fraunces', Georgia, serif; }
.mono{ font-family:'JetBrains Mono', monospace; }
svg.ic{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex:none; display:block; }
svg.ic.filled{ fill:currentColor; stroke:none; }

@media (max-width:860px){
  body{ padding:0; }
  .rpg-root{ max-width:100%; max-height:100%; height:100%; border-radius:0; box-shadow:none; }
}

/* ---------------- layout shell ---------------- */
.shell{ display:flex; min-height:100%; }

.sidebar{
  width:216px; flex:none; background:var(--card-soft);
  border-right:1px solid var(--line-strong);
  padding:22px 14px; position:sticky; top:0; align-self:flex-start; height:100%; overflow-y:auto;
  display:flex; flex-direction:column; gap:22px;
}
.brand{ display:flex; align-items:center; gap:10px; padding:0 8px; }
.brand .mark{
  width:34px; height:34px; border-radius:10px; background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 0 rgba(9,17,26,0.3), 0 5px 10px -3px rgba(9,17,26,0.35);
}
.brand .name{ font-family:'Fraunces'; font-weight:600; font-size:15.5px; line-height:1.15; }
.brand .sub{ font-size:10.5px; color:var(--ink-faint); letter-spacing:0.04em; }

.level-card{
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius);
  padding:14px; box-shadow:var(--shadow-sm);
  transform-style:preserve-3d; will-change:transform; transition:transform .18s ease, box-shadow .18s ease;
}
.level-card:hover{ box-shadow:var(--shadow-md); }
.ring-wrap{ display:flex; align-items:center; gap:12px; }
.ring{ position:relative; width:56px; height:56px; flex:none; }
.ring svg{ transform:rotate(-90deg); }
.ring .lvl{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.ring .lvl b{ font-family:'Fraunces'; font-size:19px; line-height:1; }
.ring .lvl span{ font-size:7.5px; letter-spacing:0.08em; color:var(--ink-faint); text-transform:uppercase; }
.level-title{ font-family:'Fraunces'; font-weight:600; font-size:13.5px; }
.level-xp{ font-size:10.5px; color:var(--ink-faint); font-family:'JetBrains Mono'; }

.nav{ display:flex; flex-direction:column; gap:3px; }
.nav-btn{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm);
  border:none; background:transparent; color:var(--ink-soft); font-size:13.5px; font-weight:500;
  cursor:pointer; text-align:left; width:100%; transition:background .15s ease, color .15s ease;
}
.nav-btn:hover{ background:rgba(30,45,61,0.05); color:var(--ink); }
.nav-btn.active{ background:var(--ink); color:var(--paper); }
.nav-btn .ic{ opacity:0.85; }

.streaks-mini{ display:flex; flex-direction:column; gap:6px; }
.streaks-mini .row{ display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--ink-soft); }
.streaks-mini .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
.streaks-mini b{ color:var(--ink); font-family:'JetBrains Mono'; }

.sidebar-foot{ margin-top:auto; }
.reset-link{ background:none;border:none;color:var(--ink-faint); font-size:11px; cursor:pointer; text-decoration:underline; padding:0;}

/* mobile topbar + bottom nav */
.mobile-top{ display:none; }
.mobile-nav{ display:none; }

/* ---------------- main content ---------------- */
.main{ flex:1; min-width:0; padding:30px 34px 80px; max-width:820px; }
.page-head{ margin-bottom:22px; }
.page-head .eyebrow{ font-size:11.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; }
.page-head h1{ font-family:'Fraunces'; font-weight:600; font-size:26px; margin:2px 0 0; }
.page-head p{ color:var(--ink-soft); font-size:14px; margin:6px 0 0; max-width:56ch; }

.card{
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius);
  padding:20px; margin-bottom:16px; box-shadow:var(--shadow-sm);
  transition: transform .22s cubic-bezier(.2,.8,.3,1), box-shadow .22s ease;
}
.card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-md); }
.pomodoro-card{ transition: background .3s ease; }
.pomodoro-card.pomodoro-break{ background:var(--leitura-bg); }
.card h2{ font-family:'Fraunces'; font-weight:600; font-size:17px; margin:0 0 4px; display:flex; align-items:center; gap:9px; flex-wrap:wrap;}
.card h3{ font-family:'Fraunces'; font-weight:600; font-size:15px; margin:18px 0 8px; }
.muted{ color:var(--ink-soft); font-size:13px; }
.faint{ color:var(--ink-faint); font-size:12px; }

/* banner */
.banner{
  display:flex; align-items:center; gap:10px; background:var(--gold-bg); color:#1C4E8A;
  border:1px solid rgba(184,145,43,0.35); border-radius:var(--radius-sm); padding:11px 14px; margin-bottom:16px;
  font-size:13.5px; font-weight:500; animation: pop .4s cubic-bezier(.2,1.4,.4,1);
}
@keyframes pop{ from{opacity:0; transform:translateY(-6px) scale(0.97);} to{opacity:1; transform:none;} }
.banner.warn{ background:var(--danger-bg); color:#8A2E22; border-color:rgba(178,58,46,0.35); }
.banner .close{ margin-left:auto; background:none; border:none; cursor:pointer; color:inherit; opacity:0.6; padding:2px;}
.banner .close:hover{ opacity:1; }
.rule-note{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--danger); background:var(--danger-bg);
  border-radius:999px; padding:5px 11px; margin-top:8px; width:fit-content; }

/* quest rows */
.quest-list{ display:flex; flex-direction:column; }
.quest{
  display:flex; align-items:center; gap:13px; padding:12px 6px; border-bottom:1px solid var(--line);
  transition:background .15s ease;
}
.quest:last-child{ border-bottom:none; }
.quest:hover{ background:rgba(30,45,61,0.025); }

.checkbox{
  width:24px; height:24px; border-radius:8px; border:2px solid var(--line-strong); flex:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative;
  transition:background .18s ease, border-color .18s ease, transform .12s ease;
  background:var(--card);
}
.checkbox:hover{ border-color:var(--ink-faint); }
.checkbox.done{ background:var(--estudo); border-color:var(--estudo); box-shadow:0 2px 5px -1px rgba(46,111,168,0.5); animation:checkPop .35s cubic-bezier(.3,1.6,.4,1); }
@keyframes checkPop{ 0%{ transform:scale(0.75); } 60%{ transform:scale(1.12); } 100%{ transform:scale(1); } }
.checkbox:active{ transform:scale(0.9); }
.checkbox svg{ width:14px; height:14px; stroke:#fff; stroke-width:2.6; fill:none; stroke-linecap:round; stroke-linejoin:round;
  stroke-dasharray:20; stroke-dashoffset:20; transition:stroke-dashoffset .25s ease .05s; }
.checkbox.done svg{ stroke-dashoffset:0; }

.q-icon{
  width:32px; height:32px; border-radius:9px; flex:none; display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 0 rgba(9,17,26,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
  transition:transform .2s cubic-bezier(.2,1.4,.4,1);
}
.quest:hover .q-icon{ transform:translateY(-1px) scale(1.05); }
.q-body{ flex:1; min-width:0; }
.q-name{ font-size:14px; font-weight:500; transition:color .15s ease; }
.q-name.done{ color:var(--ink-faint); text-decoration:line-through; text-decoration-color:var(--ink-faint); }
.q-xp{ font-family:'JetBrains Mono'; font-size:10.5px; color:var(--ink-faint); }
.q-del{ background:none;border:none;color:var(--ink-faint); cursor:pointer; padding:4px; border-radius:6px; opacity:0; transition:opacity .15s;}
.quest:hover .q-del{ opacity:1; }
.q-del:hover{ color:var(--boxe); background:var(--boxe-bg); }

.empty{ font-size:13px; color:var(--ink-faint); font-style:italic; padding:14px 4px; text-align:center; }

/* forms */
.inline-form{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
input.field, textarea.field{
  font-family:'Inter'; font-size:13.5px; padding:10px 12px; border:1px solid var(--line-strong);
  border-radius:var(--radius-sm); background:var(--card-soft); color:var(--ink); width:100%;
  transition:border-color .15s ease, box-shadow .15s ease;
}
input.field{ flex:1 1 160px; min-width:0; }
input.field:focus, textarea.field:focus{ outline:none; border-color:var(--ink-soft); box-shadow:0 0 0 3px rgba(30,45,61,0.08); }
textarea.field{ min-height:90px; resize:vertical; }
.btn{
  font-family:'Inter'; font-weight:600; font-size:13.5px; cursor:pointer; border-radius:var(--radius-sm);
  border:1px solid var(--ink); background:var(--ink); color:var(--paper); padding:10px 16px; white-space:nowrap;
  transition:background .15s ease, transform .12s ease, box-shadow .12s ease;
  box-shadow:0 3px 0 rgba(9,17,26,0.35), 0 5px 10px -4px rgba(9,17,26,0.35);
  position:relative; top:0;
}
.btn:hover{ background:#2E4258; transform:translateY(-1px); box-shadow:0 4px 0 rgba(9,17,26,0.35), 0 8px 14px -4px rgba(9,17,26,0.4); }
.btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(9,17,26,0.35), 0 2px 6px -2px rgba(9,17,26,0.4); }
.btn.ghost{ background:transparent; color:var(--ink); box-shadow:none; }
.btn.ghost:hover{ background:rgba(30,45,61,0.06); transform:none; box-shadow:none; }
.btn.block{ width:100%; }

/* --------------- dashboard hero --------------- */
.hero{
  background:var(--card); border:1px solid var(--line-strong); border-radius:var(--radius);
  padding:22px; margin-bottom:16px; display:flex; align-items:center; gap:22px; box-shadow:var(--shadow-sm);
  flex-wrap:wrap;
  transform-style:preserve-3d; will-change:transform; transition:transform .18s ease, box-shadow .18s ease;
}
.hero:hover{ box-shadow:var(--shadow-md); }
.hero-ring{ position:relative; width:98px; height:98px; flex:none; }
.hero-ring svg{ transform:rotate(-90deg); }
.hero-ring .lvl{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.hero-ring .lvl b{ font-family:'Fraunces'; font-size:32px; line-height:1; }
.hero-ring .lvl span{ font-size:9px; letter-spacing:0.08em; color:var(--ink-faint); text-transform:uppercase; }
.hero-info{ flex:1; min-width:220px; }
.hero-info .title{ font-family:'Fraunces'; font-weight:600; font-size:19px; }
.hero-info .xp{ font-family:'JetBrains Mono'; font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
.xpbar-track{ height:8px; background:rgba(30,45,61,0.09); border-radius:5px; overflow:hidden; margin-top:8px; width:100%; max-width:340px;}
.xpbar-fill{ height:100%; background:linear-gradient(90deg,var(--gold),#7FB3EF); transition:width .5s ease; border-radius:5px;}
.streak-chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.streak-chip{
  display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; font-size:11.5px; font-weight:600;
}

/* --------------- study track --------------- */
.timeline{ position:relative; padding-left:38px; }
.timeline::before{ content:''; position:absolute; left:15px; top:6px; bottom:6px; width:2px; background:var(--line-strong); }
.phase{ position:relative; margin-bottom:8px; }
.phase-node{
  position:absolute; left:-38px; top:14px; width:32px; height:32px; border-radius:50%;
  border:2px solid var(--estudo); background:var(--card); color:var(--estudo);
  display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono'; font-size:12px; font-weight:700;
  z-index:1;
}
.phase-node.complete{ background:var(--estudo); color:#fff; }
.phase-head{
  display:flex; align-items:center; gap:12px; padding:12px 14px; cursor:pointer; border-radius:var(--radius-sm);
  border:1px solid var(--line-strong); background:var(--card-soft); transition:background .15s ease;
  flex-wrap:wrap;
}
.phase-head:hover{ background:var(--card); }
.phase-title{ font-family:'Fraunces'; font-weight:600; font-size:15px; flex:1; }
.phase-dur{ font-family:'JetBrains Mono'; font-size:10.5px; color:var(--ink-faint); }
.phase-pct{ font-family:'JetBrains Mono'; font-size:11px; color:var(--estudo); font-weight:700; width:34px; text-align:right;}
.chevron{ transition:transform .2s ease; color:var(--ink-faint); }
.chevron.open{ transform:rotate(180deg); }
.phase-body{ overflow:hidden; max-height:0; transition:max-height .3s ease; }
.phase-body.open{ max-height:900px; }
.phase-body-inner{ padding:10px 4px 6px 4px; }
.project-note{
  margin-top:8px; padding:11px 13px; background:var(--estudo-bg); border-radius:var(--radius-sm);
  font-size:13px; color:#1F4E75; display:flex; gap:8px; align-items:flex-start;
}

.bonus-group{ margin-bottom:4px; }
.bonus-group h4{ font-size:12.5px; font-weight:700; color:var(--ink-soft); margin:14px 0 7px; text-transform:uppercase; letter-spacing:0.03em;}
.chip-list{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{
  border:1px solid var(--line-strong); padding:7px 12px; border-radius:999px; font-size:12.5px; cursor:pointer;
  display:flex; align-items:center; gap:7px; background:var(--card-soft); transition:all .15s ease; color:var(--ink-soft);
  font-family:inherit;
}
.chip:hover{ border-color:var(--ink-faint); }
.chip.done{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.chip svg{ width:13px; height:13px; }

/* --------------- skills --------------- */
.skill-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.skill{
  border:1px solid var(--line-strong); border-radius:var(--radius); padding:16px; background:var(--card);
  position:relative; overflow:hidden; transition:box-shadow .18s ease;
  transform-style:preserve-3d; will-change:transform;
}
.skill.unlocked{ box-shadow:0 0 0 2px var(--gold) inset; }
.skill:hover{ box-shadow:var(--shadow-md), 0 0 0 2px var(--gold) inset; }
.skill.locked{ background:var(--card-soft); }
.skill.locked .sk-icon{ filter:grayscale(1); opacity:0.5; }
.skill.locked .sk-name, .skill.locked .sk-desc{ color:var(--ink-faint); }
.sk-icon{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
.sk-name{ font-family:'Fraunces'; font-weight:600; font-size:14.5px; }
.sk-desc{ font-size:12px; color:var(--ink-soft); margin:4px 0 10px; }
.sk-track{ height:5px; background:rgba(30,45,61,0.09); border-radius:4px; overflow:hidden; }
.sk-fill{ height:100%; border-radius:4px; }
.sk-prog{ font-family:'JetBrains Mono'; font-size:10px; color:var(--ink-faint); margin-top:5px; }
.sk-badge{ position:absolute; top:12px; right:12px; color:var(--gold); }

/* --------------- diary --------------- */
.diary-entry{ padding:12px 4px; border-bottom:1px solid var(--line); display:flex; gap:12px; }

code.mono{ background:var(--card-soft); border:1px solid var(--line-strong); border-radius:5px; padding:1px 6px; }
.diary-entry:last-child{ border-bottom:none; }
.diary-entry .d-icon{ width:30px; height:30px; border-radius:9px; background:var(--leitura-bg); color:var(--leitura); flex:none; display:flex; align-items:center; justify-content:center; }
.diary-entry .d-date{ font-family:'JetBrains Mono'; font-size:10px; color:var(--ink-faint); margin-bottom:3px; }
.diary-entry p{ margin:0; white-space:pre-wrap; font-size:13.5px; line-height:1.55; }

.loading{ display:flex; align-items:center; justify-content:center; height:100vh; font-family:'JetBrains Mono'; color:var(--ink-faint); font-size:13px; gap:10px;}
.spin{ width:16px; height:16px; border:2px solid var(--line-strong); border-top-color:var(--ink-soft); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

@media (max-width:860px){
  .sidebar{ display:none; }
  .mobile-top{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 16px; position:sticky; top:0; z-index:5; background:var(--paper);
    border-bottom:1px solid var(--line-strong);
  }
  .mobile-top .brand{ padding:0; }
  .mobile-top .ring{ width:40px; height:40px; }
  .mobile-top .ring .lvl b{ font-size:14px; }
  .main{ padding:18px 16px 90px; max-width:none; }
  .mobile-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--card);
    border-top:1px solid var(--line-strong); z-index:6; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .mobile-nav button{
    flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:7px 2px; color:var(--ink-faint); font-size:9.5px; font-weight:600; cursor:pointer;
    min-height:44px; justify-content:center;
  }
  .mobile-nav button.active{ color:var(--ink); }
  .hero{ flex-direction:column; align-items:flex-start; padding:18px; }
  .card{ padding:16px; }
  .page-head h1{ font-size:21px; }
  .page-head p{ max-width:none; }
  .checkbox{ width:26px; height:26px; }
  .btn{ padding:11px 16px; }
  .inline-form{ flex-direction:column; }
  .inline-form .btn{ width:100%; }
  .skill-grid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .friend-row{ align-items:flex-start; }
  #pomodoroTime{ font-size:34px !important; }
  .phase{ margin-bottom:6px; }
  .phase-head{ padding:11px 12px; }
  .timeline{ padding-left:32px; }
  .phase-node{ left:-32px; width:28px; height:28px; font-size:11px; }
}

@media (max-width:420px){
  .main{ padding:14px 12px 88px; }
  .card{ padding:14px; }
  .page-head h1{ font-size:19px; }
  .hero-ring{ width:80px; height:80px; }
  .hero-ring .lvl b{ font-size:26px; }
  .rank-badge{ width:24px; height:24px; font-size:11px; }
  .mono#pomodoroTime, #pomodoroTime{ font-size:30px !important; }
}

/* =========================================================
   RESPONSIVIDADE APRIMORADA — celular, tablet e modo paisagem
   ========================================================= */
html{
  width:100%;
  min-height:100%;
  text-size-adjust:100%;
  -webkit-text-size-adjust:100%;
}
body{ min-height:100dvh; }
.rpg-root{ min-height:0; }
.shell,.main{ width:100%; }

.card,.hero,.quest,.friend-row,.phase-head,.project-note,.banner,.rule-note{ min-width:0; }
.q-name,.sk-name,.sk-desc,.page-head p,.hero-info .title,.hero-info .xp,.project-note span,.diary-entry p,.friend-info{
  overflow-wrap:anywhere;

/* ---- Sincronização COMPLETA do estado com o Firestore ----
   Toda alteração de estado (marcar tarefa, concluir item de estudo/projeto,
   registrar diário, editar nome, etc.) é gravada aqui, no documento
   states/{myCode}, além de ficar salva localmente. Isso serve tanto como
   backup na nuvem quanto como forma de restaurar a campanha em outro
   dispositivo, informando o código. */
var cloudSyncStatus = 'idle'; // idle | syncing | synced | listening | error
var cloudSyncTimer = null;
var cloudUnsubscribe = null;   // função para cancelar o listener em tempo real ativo
var lastSyncedUpdatedAt = null; // último updatedAt que este dispositivo enviou/recebeu (evita loops)
var applyingRemote = false;     // true enquanto aplicamos um estado vindo de outro dispositivo

/* Converte matrizes (arrays dentro de arrays) em mapas compatíveis com o
   Firestore. O Firestore não aceita arrays diretamente aninhados. */
function matrixToFirestoreMap(matrix){
  var out = {};
  (matrix || []).forEach(function(row, rowIndex){
    var rowMap = {};
    (row || []).forEach(function(value, colIndex){
      rowMap[String(colIndex)] = !!value;
    });
    out[String(rowIndex)] = rowMap;
  });
  return out;
}

function firestoreMapToMatrix(map, definitions){
  return definitions.map(function(definition, rowIndex){
    var row = map && map[String(rowIndex)] ? map[String(rowIndex)] : {};
    var itemCount = definition.tasks ? definition.tasks.length : definition.items.length;
    var values = [];
    for(var colIndex=0; colIndex<itemCount; colIndex++){
      values.push(!!row[String(colIndex)]);
    }
    return values;
  });
}

function encodeStateForFirestore(sourceState){
  var payload = JSON.parse(JSON.stringify(sourceState));
  payload.javaProgress = matrixToFirestoreMap(sourceState.javaProgress);
  payload.bonusProgress = matrixToFirestoreMap(sourceState.bonusProgress);
  payload.cloudSchemaVersion = 2;
  return payload;
}

function decodeStateFromFirestore(payload){
  var decoded = JSON.parse(JSON.stringify(payload || {}));

  // Formato novo: mapas. Formato antigo/local: matrizes.
  if(decoded.javaProgress && !Array.isArray(decoded.javaProgress)){
    decoded.javaProgress = firestoreMapToMatrix(decoded.javaProgress, STUDY_PHASES);
  }
  if(decoded.bonusProgress && !Array.isArray(decoded.bonusProgress)){
    decoded.bonusProgress = firestoreMapToMatrix(decoded.bonusProgress, BONUS_TRACK);
  }

  return decoded;
}

/* A gravação é agrupada por alguns milissegundos. Assim, várias mudanças
   rápidas não geram dezenas de operações simultâneas no Firestore. */
function syncStateToFirebase(){
  if(!firebaseReady || !db || !state || applyingRemote) return;

  cloudSyncStatus = 'syncing';
  updateCloudBadge();

  if(cloudSyncTimer) clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(syncStateToFirebaseNow, 350);
}

function syncStateToFirebaseNow(){
  if(!firebaseReady || !db || !state || applyingRemote) return;

  var payload;
  try{
    payload = encodeStateForFirestore(state);
  }catch(e){
    console.error('Falha ao preparar os dados para sincronização:', e);
    cloudSyncStatus = 'error';
    updateCloudBadge();
    return;
  }

  db.collection('states').doc(SYNC_DOC_ID).set(payload)
    .then(function(){
      lastSyncedUpdatedAt = payload.updatedAt || null;
      cloudSyncStatus = 'synced';
      updateCloudBadge();
    })
    .catch(function(error){
      console.error('Falha ao salvar no Firestore:', error);
      cloudSyncStatus = 'error';
      updateCloudBadge();
    });
}

/* Listener em tempo real. Toda alteração feita em outro navegador ou
   dispositivo é aplicada automaticamente quando for mais recente. */
function startCloudListener(){
  if(!firebaseReady || !db) return;

  if(cloudUnsubscribe){
    cloudUnsubscribe();
    cloudUnsubscribe = null;
  }

  cloudUnsubscribe = db.collection('states').doc(SYNC_DOC_ID)
    .onSnapshot({ includeMetadataChanges:true }, function(doc){
      if(!doc.exists) return;
      if(doc.metadata.hasPendingWrites) return;

      var remote = decodeStateFromFirestore(doc.data());
      if(!remote) return;

      var remoteUpdatedAt = Number(remote.updatedAt || 0);
      var localUpdatedAt = Number((state && state.updatedAt) || 0);

      if(remoteUpdatedAt <= localUpdatedAt) return;

      lastSyncedUpdatedAt = remoteUpdatedAt;
      applyRemoteState(remote);
    }, function(error){
      console.error('Falha no listener do Firestore:', error);
      cloudSyncStatus = 'error';
      updateCloudBadge();
    });
}

function normalizeLoadedState(loaded){
  var normalized = Object.assign(defaultState(), loaded || {});

  if(!Array.isArray(normalized.javaProgress) ||
     normalized.javaProgress.length !== STUDY_PHASES.length){
    normalized.javaProgress = STUDY_PHASES.map(function(phase, phaseIndex){
      var existing = Array.isArray(normalized.javaProgress) ? normalized.javaProgress[phaseIndex] : null;
      return phase.tasks.map(function(_, itemIndex){
        return !!(existing && existing[itemIndex]);
      });
    });
  }

  if(!Array.isArray(normalized.bonusProgress) ||
     normalized.bonusProgress.length !== BONUS_TRACK.length){
    normalized.bonusProgress = BONUS_TRACK.map(function(group, groupIndex){
      var existing = Array.isArray(normalized.bonusProgress) ? normalized.bonusProgress[groupIndex] : null;
      return group.items.map(function(_, itemIndex){
        return !!(existing && existing[itemIndex]);
      });
    });
  }

  if(!normalized.taskLog) normalized.taskLog = {};
  if(!normalized.customTasks) normalized.customTasks = [];
  if(!normalized.diary) normalized.diary = [];
  if(!normalized.diaryAwarded) normalized.diaryAwarded = {};
  if(!Array.isArray(normalized.todos)) normalized.todos = [];
  if(!normalized.employability){
    normalized.employability = DEFAULT_EMPLOYABILITY.map(function(t,i){
      return {id:'e'+i, text:t, done:false};
    });
  }

  return normalized;
}

function applyRemoteState(remote){
  applyingRemote = true;

  try{
    state = normalizeLoadedState(decodeStateFromFirestore(remote));
    lastSyncedUpdatedAt = Number(state.updatedAt || 0);

    // Salva localmente sem reenviar, pois esse estado já veio da nuvem.
    kvSet('rpg-state-v2', JSON.stringify(state)).catch(function(){});

    cloudSyncStatus = 'listening';
    render();
  }finally{
    applyingRemote = false;
  }
}

/* ================= ARMAZENAMENTO (Claude Artifacts ou navegador comum) ================= */
var hasClaudeStorage = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');

async function kvGet(key){
  if(hasClaudeStorage){
    return await window.storage.get(key, false);
  }
  try{
    var v = localStorage.getItem(key);
    return v!==null ? { key:key, value:v, shared:false } : null;
  }catch(e){ return null; }
}
async function kvSet(key, value){
  if(hasClaudeStorage){
    return await window.storage.set(key, value, false);
  }
  try{ localStorage.setItem(key, value); return { key:key, value:value, shared:false }; }
  catch(e){ return null; }
}

/* ---- Pomodoro (estado só em memória, não persiste no state salvo) ---- */
var pomodoro = { workMin:25, breakMin:5, secondsLeft:25*60, mode:'foco', running:false, cycles:0 };
var pomodoroTimerId = null;

function pomodoroFormat(){
  var m = Math.floor(pomodoro.secondsLeft/60), s = pomodoro.secondsLeft%60;
  return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}
function pomodoroUpdateDOM(){
  var timeEl = byId('pomodoroTime');
  if(!timeEl) return; // aba "hoje" não está visível agora — segue contando em segundo plano
  timeEl.textContent = pomodoroFormat();
  var modeEl = byId('pomodoroMode');
  if(modeEl) modeEl.textContent = pomodoro.mode==='foco' ? 'Foco' : 'Pausa';
  var startBtn = byId('pomodoroStartBtn');
  if(startBtn) startBtn.textContent = pomodoro.running ? 'Pausar' : 'Iniciar';
  var card = byId('pomodoroCard');
  if(card) card.classList.toggle('pomodoro-break', pomodoro.mode==='pausa');
  var cyclesEl = byId('pomodoroCycles');
  if(cyclesEl) cyclesEl.textContent = pomodoro.cycles||0;
}
function pomodoroTick(){
  if(pomodoro.secondsLeft>0){
    pomodoro.secondsLeft--;
  } else if(pomodoro.mode==='foco'){
    pomodoro.cycles = (pomodoro.cycles||0)+1;
    pomodoro.mode='pausa';
    pomodoro.secondsLeft = pomodoro.breakMin*60;
  } else {
    pomodoro.mode='foco';
    pomodoro.secondsLeft = pomodoro.workMin*60;
  }
  pomodoroUpdateDOM();
}
function pomodoroStart(){
  if(pomodoro.running) return;
  pomodoro.running = true;
  pomodoroTimerId = setInterval(pomodoroTick, 1000);
  pomodoroUpdateDOM();
}
function pomodoroPause(){
  pomodoro.running = false;
  if(pomodoroTimerId){ clearInterval(pomodoroTimerId); pomodoroTimerId = null; }
  pomodoroUpdateDOM();
}
function pomodoroToggle(){ pomodoro.running ? pomodoroPause() : pomodoroStart(); }
function pomodoroReset(){
  pomodoroPause();
  pomodoro.mode = 'foco';
  pomodoro.secondsLeft = pomodoro.workMin*60;
  pomodoroUpdateDOM();
}
function pomodoroSkip(){
  pomodoro.secondsLeft = 0;
  pomodoroTick();
}

function todayKey(){ return fmt(new Date()); }
function fmt(d){
  var y=d.getFullYear(), m=('0'+(d.getMonth()+1)).slice(-2), day=('0'+d.getDate()).slice(-2);
  return y+'-'+m+'-'+day;
}
function addXP(amount){
  state.totalXP += amount;
}
function defaultState(){
  return {
    totalXP:0,
    taskLog:{},
    customTasks:[],
    javaProgress: STUDY_PHASES.map(function(p){ return p.tasks.map(function(){return false;}); }),
    bonusProgress: BONUS_TRACK.map(function(g){ return g.items.map(function(){return false;}); }),
    employability: DEFAULT_EMPLOYABILITY.map(function(t,i){ return {id:'e'+i, text:t, done:false}; }),
    diary: [],
    diaryAwarded: {},
    todos: [],
    lastPenaltyCheck: todayKey(),
    /* IMPORTANTE: updatedAt começa em 0 (e não Date.now()) de propósito.
       Um estado padrão/vazio precisa SEMPRE parecer mais "antigo" do que
       qualquer estado real salvo na nuvem. Se aqui fosse Date.now(), toda
       vez que o app abrisse sem dado local (outro navegador, cache limpo,
       modo anônimo, um bot visitando a página) ele acharia que o estado
       vazio é "mais novo" que o progresso real salvo no Firestore e
       sobrescreveria a nuvem com dados em branco — foi exatamente isso
       que causou a perda de progresso. */
    updatedAt: 0
  };
}

async function loadState(){
  try{
    var r = await kvGet('rpg-state-v2');
    if(r && r.value){
      state = normalizeLoadedState(JSON.parse(r.value));
    } else {
      try{
        var old = await kvGet('rpg-state-v1');
        state = old && old.value
          ? normalizeLoadedState(JSON.parse(old.value))
          : defaultState();
      }catch(e2){
        state = defaultState();
      }
    }
  }catch(e){
    state = defaultState();
  }

  if(!state.lastPenaltyCheck) state.lastPenaltyCheck = todayKey();

  var penaltyResult = processMissedDays();
  if(penaltyResult.days>0){
    penaltyMessage = 'Você deixou missões incompletas em '+penaltyResult.days+' dia(s) anterior(es) — perdeu '+penaltyResult.xpLost+' XP.';
    state.updatedAt = Date.now();
  }

  // Mostra imediatamente a versão local enquanto a nuvem é consultada.
  render();

  if(!firebaseReady || !db){
    await saveState();
    return;
  }

  cloudSyncStatus = 'syncing';
  updateCloudBadge();

  try{
    var doc = await db.collection('states').doc(SYNC_DOC_ID).get();

    if(doc.exists){
      var remote = normalizeLoadedState(decodeStateFromFirestore(doc.data()));
      var remoteUpdatedAt = Number(remote.updatedAt || 0);
      var localUpdatedAt = Number(state.updatedAt || 0);

      if(remoteUpdatedAt > localUpdatedAt){
        applyRemoteState(remote);
      }else{
        await saveState();
      }
    }else{
      await saveState();
    }
  }catch(error){
    console.error('Não foi possível carregar o estado da nuvem:', error);
    cloudSyncStatus = 'error';
    updateCloudBadge();
    await kvSet('rpg-state-v2', JSON.stringify(state));
  }

  startCloudListener();
  render();
}

function processMissedDays(){
  var today = todayKey();
  var d = new Date(state.lastPenaltyCheck);
  d.setDate(d.getDate()+1);
  var customIds = state.customTasks.map(function(t){return t.id;});
  var daysAffected = 0, xpLost = 0, guard = 0;
  while(fmt(d) < today && guard < 90){
    var key = fmt(d), dow = d.getDay();
    var log = state.taskLog[key] || {};
    var cats = ['estudo','leitura','boxe','academia','corrida'].filter(function(c){ return isScheduled(c,dow); });
    var hasAnything = cats.length>0 || customIds.length>0;
    var allDone = cats.every(function(c){return log[c];}) && customIds.every(function(id){return log.custom && log.custom[id];});
    if(hasAnything && !allDone && !log.penaltyApplied){
      log.penaltyApplied = true;
      addXP(-40);
      state.taskLog[key] = log;
      daysAffected++; xpLost += 40;
    }
    d.setDate(d.getDate()+1);
    guard++;
  }
  if(state.totalXP<0) state.totalXP = 0;
  state.lastPenaltyCheck = today;
  return { days:daysAffected, xpLost:xpLost };
}

async function saveState(){
  state.updatedAt = Date.now();
  try{ await kvSet('rpg-state-v2', JSON.stringify(state)); }
  catch(e){ /* falha silenciosa de gravação */ }
  // toda alteração de estado (missões, projetos, diário, nome, etc.) também
  // é enviada ao Firestore, para servir de backup/sincronização na nuvem
  syncStateToFirebase();
}

function level(){ return Math.floor(state.totalXP/100)+1; }

function titleForLevel(lv){

  if(lv<6) return 'Escudeiro do Loop';
  if(lv<10) return 'Caçador de Bugs';
  if(lv<15) return 'Cavaleiro do Merge Conflict';

  return 'Lenda do Deploy em Produção';
}

function isScheduled(cat, dow){
  if(cat==='estudo' || cat==='leitura') return true;
  if(cat==='boxe') return dow===1 || dow===3;
  if(cat==='academia') return dow===2 || dow===4 || dow===6;
  if(cat==='corrida') return dow===6;
  return false;
}

function streakFor(s, cat){
  var count=0, d=new Date(), first=true;
  for(var i=0;i<365;i++){
    var key = fmt(d), dow = d.getDay();
    if(isScheduled(cat,dow)){
      var done = s.taskLog[key] && s.taskLog[key][cat];
      if(done){ count++; }
      else if(!first){ break; }
    }
    first=false;
    d.setDate(d.getDate()-1);
  }
  return count;
}
function countDone(s, cat){
  var n=0;
  for(var k in s.taskLog){ if(s.taskLog[k] && s.taskLog[k][cat]) n++; }
  return n;
}
function phaseComplete(s, idx){
  var arr = s.javaProgress[idx];
  return arr && arr.every(function(v){return v;});
}
function bonusGroupComplete(s, gi){
  var arr = s.bonusProgress[gi];
  return arr && arr.every(function(v){return v;});
}
function countPerfectDays(s){
  var n=0;
  for(var k in s.taskLog){ if(s.taskLog[k] && s.taskLog[k].perfectAwarded) n++; }
  return n;
}
function levelOf(s){ return Math.floor(s.totalXP/100)+1; }
function countStudyItemsDone(s){
  var n=0; s.javaProgress.forEach(function(arr){ arr.forEach(function(v){ if(v) n++; }); }); return n;
}
function countBonusItemsDone(s){
  var n=0; s.bonusProgress.forEach(function(arr){ arr.forEach(function(v){ if(v) n++; }); }); return n;
}
function totalDailyTasksDone(s){
  var n=0; ['estudo','leitura','boxe','academia','corrida'].forEach(function(c){ n+=countDone(s,c); }); return n;
}
function perfectStreak(s){
  var count=0, d=new Date(), first=true;
  for(var i=0;i<400;i++){
    var key = fmt(d);
    var done = s.taskLog[key] && s.taskLog[key].perfectAwarded;
    if(done){ count++; } else if(!first){ break; }
    first=false;
    d.setDate(d.getDate()-1);
  }
  return count;
}
function countCustomDone(s){
  var n=0;
  for(var k in s.taskLog){
    var log = s.taskLog[k];
    if(log && log.custom){ for(var id in log.custom){ if(log.custom[id]) n++; } }
  }
  return n;
}
function todaysCategories(){
  var dow = new Date().getDay();
  var out = [];
  ['estudo','leitura','boxe','academia','corrida'].forEach(function(c){
    if(isScheduled(c,dow)) out.push(c);
  });
  return out;
}
function ensureLog(key){
  if(!state.taskLog[key]) state.taskLog[key] = {};
  return state.taskLog[key];
}

function toggleCategoryTask(cat){
  var key = todayKey();
  var log = ensureLog(key);
  var was = !!log[cat];
  log[cat] = !was;
  addXP(was ? -XP.task : XP.task);
  checkPerfectDay(key, log);
  afterChange();
}
function toggleCustomTask(id){
  var key = todayKey();
  var log = ensureLog(key);
  if(!log.custom) log.custom = {};
  var was = !!log.custom[id];
  log.custom[id] = !was;
  addXP(was ? -XP.task : XP.task);
  checkPerfectDay(key, log);
  afterChange();
}
function checkPerfectDay(key, log){
  var cats = todaysCategories();
  var customIds = state.customTasks.map(function(t){return t.id;});
  var allDone = cats.every(function(c){return log[c];}) &&
                customIds.every(function(id){return log.custom && log.custom[id];});
  if(allDone && !log.perfectAwarded){
    log.perfectAwarded = true;
    addXP(XP.perfectDay);
  } else if(!allDone && log.perfectAwarded){
    log.perfectAwarded = false;
    addXP(-XP.perfectDay);
  }
}

/* ---- Backup manual (exportar/importar um arquivo .json com todo o progresso) ---- */
function exportBackup(){
  var payload = JSON.stringify(state, null, 2);
  var blob = new Blob([payload], { type:'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'campanha-backup-'+todayKey()+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importBackupFile(file){
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var parsed;
    try{ parsed = JSON.parse(e.target.result); }
    catch(err){ alert('Arquivo inválido. Verifique se é um backup exportado por este app.'); return; }
    if(!confirm('Isso vai substituir todo o seu progresso atual pelo backup importado. Continuar?')) return;
    state = normalizeLoadedState(parsed);
    state.updatedAt = Date.now();
    saveState();
    render();
  };
  reader.readAsText(file);
}


/* ================= NOTÍCIAS COTIDIANAS =================
   A página consulta feeds RSS de fontes reconhecidas. Como navegadores
   bloqueiam muitos feeds por CORS, há duas tentativas:
   1) rss2json.com
   2) allorigins.win + leitura local do XML
   O cache dura 30 minutos para evitar requisições excessivas.
========================================================== */
var NEWS_CACHE_KEY = 'rpg-news-cache-v2';
var NEWS_CACHE_MS = 30 * 60 * 1000;

var NEWS_SOURCES = [
  { category:'tecnologia', language:'en', name:'MIT Technology Review', feed:'https://www.technologyreview.com/feed/', home:'https://www.technologyreview.com/' },
  { category:'tecnologia', language:'en', name:'TechCrunch', feed:'https://techcrunch.com/feed/', home:'https://techcrunch.com/' },

  { category:'programacao', language:'en', name:'GitHub Blog', feed:'https://github.blog/feed/', home:'https://github.blog/' },
  { category:'programacao', language:'en', name:'Stack Overflow Blog', feed:'https://stackoverflow.blog/feed/', home:'https://stackoverflow.blog/' },

  { category:'financeiro', language:'pt', name:'CVM — Legislação', feed:'https://www.cvm.gov.br/feed/legislacao.xml', home:'https://www.gov.br/cvm/pt-br' },
  { category:'financeiro', language:'pt', name:'CVM — Decisões', feed:'https://www.cvm.gov.br/feed/decisoes.xml', home:'https://www.gov.br/cvm/pt-br' },
  { category:'financeiro', language:'pt', name:'Banco Central do Brasil', feed:'https://news.google.com/rss/search?q=site%3Abcb.gov.br%20Banco%20Central&hl=pt-BR&gl=BR&ceid=BR%3Apt-419', home:'https://www.bcb.gov.br/' }
];

function newsCategoryLabel(category){
  return {
    tecnologia:'Tecnologia',
    programacao:'Programação',
    financeiro:'Financeiro'
  }[category] || 'Notícias';
}

function stripNewsHtml(value){
  var div = document.createElement('div');
  div.innerHTML = value || '';
  return (div.textContent || div.innerText || '').replace(/\s+/g,' ').trim();
}

function extractNewsImage(html){
  if(!html) return '';
  var match = String(html).match(/<img[^>]+src=["']([^"']+)["']/i);
  return match ? match[1] : '';
}

function safeNewsUrl(url){
  try{
    var parsed = new URL(url, location.href);
    if(parsed.protocol==='http:' || parsed.protocol==='https:') return parsed.href;
  }catch(e){}
  return '';
}

function formatNewsDate(value){
  if(!value) return 'Data não informada';
  var date = new Date(value);
  if(isNaN(date.getTime())) return 'Data não informada';
  return date.toLocaleDateString('pt-BR',{
    day:'2-digit',
    month:'short',
    year:'numeric'
  });
}

function normalizeRss2JsonItem(item, source){
  var image = '';
  if(item.thumbnail) image = item.thumbnail;
  if(!image && item.enclosure && item.enclosure.link) image = item.enclosure.link;
  if(!image) image = extractNewsImage(item.content || item.description);

  return {
    category:source.category,
    language:source.language || 'auto',
    source:source.name,
    sourceHome:source.home,
    title:stripNewsHtml(item.title),
    description:stripNewsHtml(item.description || item.content).slice(0,420),
    link:safeNewsUrl(item.link),
    image:safeNewsUrl(image),
    published:item.pubDate || item.published || ''
  };
}

function fetchJsonWithTimeout(url, timeoutMs){
  var controller = typeof AbortController!=='undefined' ? new AbortController() : null;
  var timer = setTimeout(function(){ if(controller) controller.abort(); }, timeoutMs || 12000);
  return fetch(url,{signal:controller ? controller.signal : undefined})
    .then(function(response){
      if(!response.ok) throw new Error('HTTP '+response.status);
      return response.json();
    })
    .finally(function(){ clearTimeout(timer); });
}

function fetchTextWithTimeout(url, timeoutMs){
  var controller = typeof AbortController!=='undefined' ? new AbortController() : null;
  var timer = setTimeout(function(){ if(controller) controller.abort(); }, timeoutMs || 12000);
  return fetch(url,{signal:controller ? controller.signal : undefined})
    .then(function(response){
      if(!response.ok) throw new Error('HTTP '+response.status);
      return response.text();
    })
    .finally(function(){ clearTimeout(timer); });
}

function fetchNewsViaRss2Json(source){
  var endpoint = 'https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(source.feed);
  return fetchJsonWithTimeout(endpoint,12000).then(function(data){
    if(!data || data.status!=='ok' || !Array.isArray(data.items)){
      throw new Error('Feed indisponível');
    }
    return data.items.slice(0,8).map(function(item){
      return normalizeRss2JsonItem(item,source);
    });
  });
}

function xmlNodeText(node, selectors){
  for(var i=0;i<selectors.length;i++){
    var found = node.querySelector(selectors[i]);
    if(found && found.textContent) return found.textContent.trim();
  }
  return '';
}

function fetchNewsViaAllOrigins(source){
  var endpoint = 'https://api.allorigins.win/raw?url='+encodeURIComponent(source.feed);
  return fetchTextWithTimeout(endpoint,15000).then(function(xmlText){
    var xml = new DOMParser().parseFromString(xmlText,'text/xml');
    if(xml.querySelector('parsererror')) throw new Error('XML inválido');

    var nodes = Array.prototype.slice.call(xml.querySelectorAll('item, entry')).slice(0,8);
    return nodes.map(function(node){
      var linkNode = node.querySelector('link');
      var link = '';
      if(linkNode){
        link = linkNode.getAttribute('href') || linkNode.textContent || '';
      }
      var description = xmlNodeText(node,['description','summary','content']);
      var image = '';
      var enclosure = node.querySelector('enclosure');
      if(enclosure) image = enclosure.getAttribute('url') || '';
      if(!image){
        var media = node.querySelector('thumbnail, content');
        if(media) image = media.getAttribute('url') || '';
      }
      if(!image) image = extractNewsImage(description);

      return {
        category:source.category,
        source:source.name,
        sourceHome:source.home,
        title:stripNewsHtml(xmlNodeText(node,['title'])),
        description:stripNewsHtml(description).slice(0,420),
        link:safeNewsUrl(link),
        image:safeNewsUrl(image),
        published:xmlNodeText(node,['pubDate','published','updated'])
      };
    });
  });
}

function fetchNewsSource(source){
  return fetchNewsViaRss2Json(source).catch(function(){
    return fetchNewsViaAllOrigins(source);
  });
}

function dedupeAndSortNews(items){
  var seen = {};
  return items.filter(function(item){
    if(!item || !item.title || !item.link) return false;
    var key = (item.link || item.title).toLowerCase().replace(/[#?].*$/,'');
    if(seen[key]) return false;
    seen[key] = true;
    return true;
  }).sort(function(a,b){
    return new Date(b.published || 0).getTime() - new Date(a.published || 0).getTime();
  }).slice(0,36);
}

function readNewsCache(){
  try{
    var raw = localStorage.getItem(NEWS_CACHE_KEY);
    if(!raw) return null;
    var cache = JSON.parse(raw);
    if(!cache || !Array.isArray(cache.items)) return null;
    return cache;
  }catch(e){ return null; }
}

function writeNewsCache(items){
  try{
    localStorage.setItem(NEWS_CACHE_KEY,JSON.stringify({
      savedAt:Date.now(),
      items:items
    }));
  }catch(e){}
}

function loadNews(force){
  if(newsState.loading) return;

  var cache = readNewsCache();
  if(!force && cache && Date.now()-Number(cache.savedAt||0)<NEWS_CACHE_MS){
    newsState.items = cache.items;
    hydrateTranslationsFromCache(newsState.items);
    newsState.lastUpdated = cache.savedAt;
    newsState.error = '';
    if(activeTab==='noticias') render();
    return;
  }

  newsState.loading = true;
  newsState.error = '';
  if(activeTab==='noticias') render();

  Promise.allSettled(NEWS_SOURCES.map(fetchNewsSource)).then(function(results){
    var items = [];
    results.forEach(function(result){
      if(result.status==='fulfilled' && Array.isArray(result.value)){
        items = items.concat(result.value);
      }
    });

    items = dedupeAndSortNews(items);
    newsState.loading = false;

    if(items.length){
      newsState.items = items;
      hydrateTranslationsFromCache(newsState.items);
      newsState.lastUpdated = Date.now();
      newsState.error = '';
      writeNewsCache(items);
    }else{
      newsState.error = 'Não foi possível consultar os feeds agora. Verifique sua conexão e tente novamente.';
    }

    if(activeTab==='noticias') render();
  }).catch(function(error){
    newsState.loading = false;
    newsState.error = 'Falha ao atualizar as notícias.';
    console.error('Falha ao carregar notícias:',error);
    if(activeTab==='noticias') render();
  });
}


var NEWS_TRANSLATION_CACHE_KEY = 'rpg-news-translations-v1';
var newsTranslationQueue = [];
var newsTranslationActive = 0;
var NEWS_TRANSLATION_CONCURRENCY = 2;

function readTranslationCache(){
  try{
    return JSON.parse(localStorage.getItem(NEWS_TRANSLATION_CACHE_KEY) || '{}');
  }catch(e){ return {}; }
}
function writeTranslationCache(cache){
  try{ localStorage.setItem(NEWS_TRANSLATION_CACHE_KEY,JSON.stringify(cache)); }
  catch(e){}
}
function newsTranslationKey(item){
  return btoa(unescape(encodeURIComponent((item.link || item.title || '').slice(0,500))))
    .replace(/=+$/,'');
}
function isEnglishNews(item){
  return item && item.language === 'en';
}
function translateTextToPortuguese(value){
  var clean = String(value || '').trim();
  if(!clean) return Promise.resolve('');
  clean = clean.slice(0,470);
  var endpoint = 'https://api.mymemory.translated.net/get?q='+
    encodeURIComponent(clean)+'&langpair=en|pt-BR';
  return fetchJsonWithTimeout(endpoint,15000).then(function(data){
    var translated = data && data.responseData && data.responseData.translatedText;
    if(!translated) throw new Error('Tradução indisponível');
    return stripNewsHtml(translated);
  });
}
function enqueueNewsTranslation(item){
  if(!isEnglishNews(item) || item.titlePt) return;
  var key = newsTranslationKey(item);
  if(newsTranslationQueue.some(function(job){return job.key===key;})) return;
  newsTranslationQueue.push({key:key,item:item});
  processNewsTranslationQueue();
}
function processNewsTranslationQueue(){
  while(newsTranslationActive < NEWS_TRANSLATION_CONCURRENCY && newsTranslationQueue.length){
    var job = newsTranslationQueue.shift();
    newsTranslationActive++;
    translateNewsItem(job.item,job.key).finally(function(){
      newsTranslationActive--;
      processNewsTranslationQueue();
    });
  }
}
function translateNewsItem(item,key){
  var cache = readTranslationCache();
  if(cache[key]){
    item.titlePt = cache[key].titlePt || '';
    item.descriptionPt = cache[key].descriptionPt || '';
    return Promise.resolve();
  }

  item.translating = true;
  if(activeTab==='noticias') render();

  return Promise.all([
    translateTextToPortuguese(item.title),
    translateTextToPortuguese(item.description)
  ]).then(function(values){
    item.titlePt = values[0] || item.title;
    item.descriptionPt = values[1] || item.description;
    item.translationError = false;
    cache[key] = {
      titlePt:item.titlePt,
      descriptionPt:item.descriptionPt,
      savedAt:Date.now()
    };
    writeTranslationCache(cache);
  }).catch(function(error){
    console.warn('Não foi possível traduzir a notícia:',error);
    item.translationError = true;
  }).finally(function(){
    item.translating = false;
    if(activeTab==='noticias') render();
  });
}
function hydrateTranslationsFromCache(items){
  var cache = readTranslationCache();
  (items || []).forEach(function(item){
    if(!isEnglishNews(item)) return;
    var saved = cache[newsTranslationKey(item)];
    if(saved){
      item.titlePt = saved.titlePt || '';
      item.descriptionPt = saved.descriptionPt || '';
    }
  });
}
function translateVisibleNews(){
  if(newsState.languageMode!=='pt') return;
  var visible = newsState.items.filter(function(item){
    return isEnglishNews(item) &&
      (newsState.filter==='todos' || item.category===newsState.filter);
  }).slice(0,12);

  visible.forEach(enqueueNewsTranslation);
}
function setNewsLanguageMode(mode){
  newsState.languageMode = mode==='original' ? 'original' : 'pt';
  render();
  if(newsState.languageMode==='pt'){
    setTimeout(translateVisibleNews,0);
  }
}


function newsCard(item){
  var category = item.category || 'tecnologia';
  var image = safeNewsUrl(item.image);
  var link = safeNewsUrl(item.link);
  var mediaClass = 'news-media '+category+(image?' has-image':'');
  var imageHtml = image
    ? "<img src=\""+esc(image)+"\" alt=\"\" loading=\"lazy\" referrerpolicy=\"no-referrer\" onerror=\"this.style.display='none';this.parentNode.classList.remove('has-image');\">"
    : '';

  var showTranslation = newsState.languageMode==='pt' && isEnglishNews(item);
  var title = showTranslation && item.titlePt ? item.titlePt : item.title;
  var description = showTranslation && item.descriptionPt ? item.descriptionPt : item.description;
  var translationInfo = '';

  if(showTranslation && !item.titlePt){
    translationInfo = item.translating
      ? '<div class="news-translation-note"><span class="spin"></span> traduzindo para português…</div>'
      : item.translationError
        ? '<div class="news-translation-note">tradução temporariamente indisponível</div>'
        : '<div class="news-translation-note">tradução será carregada automaticamente</div>';
  }

  var originalTitle = showTranslation && item.titlePt
    ? '<div class="news-original-title"><b>Original:</b> '+esc(item.title)+'</div>'
    : '';

  return '<article class="news-card">'+
    '<div class="'+mediaClass+'">'+
      '<span class="news-category">'+newsCategoryLabel(category)+'</span>'+
      imageHtml+
      '<div class="news-placeholder">'+newsCategoryLabel(category)+'</div>'+
    '</div>'+
    '<div class="news-body">'+
      '<div class="news-source">'+esc(item.source)+(isEnglishNews(item)?' · EN':' · PT')+'</div>'+
      '<h2 class="news-title"><a href="'+esc(link)+'" target="_blank" rel="noopener noreferrer">'+esc(title)+'</a></h2>'+
      originalTitle+
      (description?'<p class="news-description">'+esc(description)+'</p>':'')+
      translationInfo+
      '<div class="news-meta">'+
        '<span>'+formatNewsDate(item.published)+'</span>'+
        '<a class="news-open" href="'+esc(link)+'" target="_blank" rel="noopener noreferrer">Abrir '+icon('external')+'</a>'+
      '</div>'+
    '</div>'+
  '</article>';
}

var app = document.getElementById('app');
function esc(s){
  return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; });
}

function ringSVG(pct, size, stroke, colorVar){
  var r = (size-stroke)/2, c = 2*Math.PI*r, off = c*(1-pct/100);
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="var(--line-strong)" stroke-width="'+stroke+'"/>'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+colorVar+'" stroke-width="'+stroke+'" '+
      'stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" style="transition:stroke-dashoffset .6s ease"/>'+
  '</svg>';
}

    iconHtml = icon('plus');
  }
  var delBtn = delId ? '<button class="q-del" data-remove="'+delId+'">'+icon('trash')+'</button>' : '';
  var xpLine = (xp===null || xp===undefined) ? '' : '<div class="q-xp">+'+xp+' XP</div>';
  return '<div class="quest">'+
    '<div class="checkbox'+(done?' done':'')+'" data-toggle="'+key+'"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></div>'+

    '<div class="q-body"><div class="q-name'+(done?' done':'')+'">'+esc(label)+'</div>'+xpLine+'</div>'+
    delBtn+
  '</div>';
}

    '<p class="muted">Side quests opcionais para depois da Fase 4 — panorama geral de backend. Cada item vale +'+XP.bonusItem+' XP.</p>';
  BONUS_TRACK.forEach(function(group, gi){
    html += '<div class="bonus-group"><h4>'+esc(group.section)+'</h4><div class="chip-list">';
    group.items.forEach(function(item, ii){
      var done = state.bonusProgress[gi][ii];
      html += '<div class="chip'+(done?' done':'')+'" data-bonus="'+gi+':'+ii+'">'+(done?icon('check2'):'')+esc(item)+'</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function renderHabilidades(){
  var totalUnlocked = SKILL_DEFS.filter(function(sk){ return sk.prog(state) >= sk.need; }).length;
  var html = '<div class="page-head"><span class="eyebrow">Conquistas</span><h1>Árvore de Habilidades</h1>'+
    '<p>Desbloqueadas pela sua constância nos treinos e estudos — '+totalUnlocked+' de '+SKILL_DEFS.length+' desbloqueadas.</p></div>';

  SKILL_GROUPS.forEach(function(group){
    var items = SKILL_DEFS.filter(function(sk){ return sk.group===group; });
    if(!items.length) return;
    var unlockedCount = items.filter(function(sk){ return sk.prog(state) >= sk.need; }).length;
    html += '<div class="card"><h3 style="margin-top:0;display:flex;align-items:center;justify-content:space-between;">'+
      '<span>'+esc(group)+'</span><span class="faint mono">'+unlockedCount+' / '+items.length+'</span></h3>'+
      '<div class="skill-grid">';
    items.forEach(function(sk){
      var prog = sk.prog(state), unlocked = prog >= sk.need, p = Math.min(100, Math.round(100*prog/sk.need));
      html += '<div class="skill'+(unlocked?' unlocked':' locked')+'">'+
        '<div class="sk-badge">'+icon(unlocked?'trophy':'lock')+'</div>'+
        '<div class="sk-icon" style="background:var(--'+sk.color+'-bg);color:var(--'+sk.color+')">'+icon(sk.icon)+'</div>'+
        '<div class="sk-name">'+esc(sk.name)+'</div>'+
        '<div class="sk-desc">'+esc(sk.desc)+'</div>'+
        '<div class="sk-track"><div class="sk-fill" style="width:'+p+'%;background:var(--'+sk.color+')"></div></div>'+
        '<div class="sk-prog">'+Math.min(prog,sk.need)+' / '+sk.need+'</div>'+
      '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

function renderDiario(){
  var html = '<div class="page-head"><span class="eyebrow">Registro pessoal</span><h1>Diário de Bordo</h1>'+
    '<p>A primeira entrada do dia rende +'+XP.diary+' XP.</p></div>';
  html += '<div class="card">'+
    '<textarea class="field" id="diaryInput" placeholder="O que aconteceu hoje na sua jornada?"></textarea>'+
    '<div style="margin-top:10px;"><button class="btn" id="diarySaveBtn">'+icon('feather')+' Registrar</button></div>'+
  '</div>';
  html += '<div class="card"><h3 style="margin-top:0;">Entradas anteriores</h3>';
  if(!state.diary.length){
    html += '<div class="empty">Nenhuma entrada ainda. Comece a escrever sua saga.</div>';
  } else {
    state.diary.forEach(function(e){
      html += '<div class="diary-entry"><div class="d-icon">'+icon('feather')+'</div>'+
        '<div><div class="d-date">'+e.date+'</div><p>'+esc(e.text)+'</p></div></div>';
    });
  }
  html += '</div>';
  return html;
}

function renderConfiguracoes(){
  var html = '<div class="page-head"><span class="eyebrow">Preferências</span><h1>Configurações</h1></div>';

  html += '<div class="card"><h2>'+icon('cloud')+' Sincronização em tempo real</h2>'+
    '<p class="muted">Toda alteração — missões marcadas, itens de estudo, projetos, diário — é enviada automaticamente para o seu banco Firebase. Basta abrir este mesmo arquivo em qualquer outro navegador ou dispositivo: ele sincroniza sozinho, sem precisar copiar nenhum código.</p>'+
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'+
      '<span class="faint mono" id="cloudSyncBadgeCard">'+icon('cloud')+' '+cloudBadgeText()+'</span>'+
    '</div>';
  if(!firebaseReady){
    html += '<p class="faint" style="margin-top:10px;">A nuvem não está configurada neste arquivo — seu progresso continua salvo localmente neste navegador, mas não sincroniza entre dispositivos até o Firebase ser configurado (veja os comentários no início do código-fonte).</p>';
  }
  html += '</div>';

  html += '<div class="card"><h2>'+icon('download')+' Backup manual</h2>'+
    '<p class="muted">Exporte um arquivo com todo o seu progresso (missões, estudo, diário, XP) para guardar em outro lugar, ou restaure a partir de um backup salvo anteriormente.</p>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
      '<button class="btn" id="exportBackupBtn">'+icon('download')+' Exportar backup</button>'+
      '<label class="btn ghost" style="cursor:pointer;">'+icon('upload')+' Importar backup'+
        '<input type="file" accept="application/json" id="importBackupInput" style="display:none;"/>'+
      '</label>'+
    '</div>'+
    '<p class="faint" style="margin-top:10px;">Importar substitui todo o progresso atual pelo conteúdo do arquivo — use com cuidado.</p>'+
  '</div>';

  return html;
}

function renderEmpregabilidade(){
  var html = '<div class="page-head"><span class="eyebrow">Fora do código</span><h1>Trilha de Empregabilidade</h1>'+
    '<p>Constrói sua presença profissional. Cada tarefa vale +'+XP.employ+' XP.</p></div>';
  html += '<div class="card"><div class="quest-list">';
  state.employability.forEach(function(t){
    html += questRow('employ:'+t.id, t.text, t.done, null, XP.employ);
  });
  html += '</div><div class="inline-form">'+
    '<input class="field" id="newEmployInput" placeholder="Nova tarefa de empregabilidade"/>'+
    '<button class="btn" id="addEmployBtn">'+icon('plus')+'</button>'+
  '</div></div>';
  return html;
}

/* ================= EVENTOS ================= */

function bindEvents(){
  app.querySelectorAll('[data-tab]').forEach(function(el){
    el.addEventListener('click', function(){
      activeTab = el.getAttribute('data-tab');
      render();
      if(activeTab==='noticias' && !newsState.items.length && !newsState.loading){
        setTimeout(function(){ loadNews(false); },0);
      }
    });
  });
  app.querySelectorAll('[data-toggle]').forEach(function(el){
    el.addEventListener('click', function(){
      var parts = el.getAttribute('data-toggle').split(':');
      if(parts[0]==='cat') toggleCategoryTask(parts[1]);
      else if(parts[0]==='custom') toggleCustomTask(parts[1]);
      else if(parts[0]==='study') toggleStudyItem(parseInt(parts[1]), parseInt(parts[2]));
      else if(parts[0]==='employ') toggleEmployTask(parts[1]);
      else if(parts[0]==='todo') toggleTodo(parts[1]);
    });
  });
  app.querySelectorAll('[data-remove]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var id = el.getAttribute('data-remove');
      if(activeTab==='todo') removeTodo(id);
      else removeCustomTask(id);
    });
  });
  app.querySelectorAll('[data-openphase]').forEach(function(el){
    el.addEventListener('click', function(){
      var idx = parseInt(el.getAttribute('data-openphase'));
      openPhase = (openPhase===idx) ? null : idx;
      render();
    });
  });
  app.querySelectorAll('[data-bonus]').forEach(function(el){
    el.addEventListener('click', function(){
      var parts = el.getAttribute('data-bonus').split(':');
      toggleBonusItem(parseInt(parts[0]), parseInt(parts[1]));
    });
  });

  bindClick('addTaskBtn', function(){ addCustomTask(byId('newTaskInput').value); });
  bindEnter('newTaskInput', function(v){ addCustomTask(v); });
  bindClick('addEmployBtn', function(){ addEmployTask(byId('newEmployInput').value); });
  bindEnter('newEmployInput', function(v){ addEmployTask(v); });
  bindClick('addTodoBtn', function(){ addTodo(byId('newTodoInput').value); });
  bindEnter('newTodoInput', function(v){ addTodo(v); });
  bindClick('clearDoneTodosBtn', clearDoneTodos);
  bindClick('diarySaveBtn', function(){ addDiaryEntry(byId('diaryInput').value); });
  bindClick('resetBtn', resetAll);
  bindClick('pomodoroStartBtn', pomodoroToggle);
  bindClick('pomodoroResetBtn', pomodoroReset);
  bindClick('pomodoroSkipBtn', pomodoroSkip);
  bindClick('dismissPenalty', function(){ penaltyMessage = null; render(); });

  app.querySelectorAll('[data-news-filter]').forEach(function(el){
    el.addEventListener('click',function(){
      newsState.filter = el.getAttribute('data-news-filter');
      render();
      if(newsState.languageMode==='pt') setTimeout(translateVisibleNews,0);
    });
  });
  app.querySelectorAll('[data-news-language]').forEach(function(el){
    el.addEventListener('click',function(){
      setNewsLanguageMode(el.getAttribute('data-news-language'));
    });
  });
  bindClick('refreshNewsBtn',function(){ loadNews(true); });

  bindClick('exportBackupBtn', exportBackup);
  var importInputEl = byId('importBackupInput');
  if(importInputEl){
    importInputEl.addEventListener('change', function(e){
      importBackupFile(e.target.files[0]);
      e.target.value = '';
    });
  }

  bind3DTilt();
}

/* ---- efeito visual de inclinação 3D (não afeta estado/funcionalidade) ---- */
function bind3DTilt(){
  if(window.matchMedia && !window.matchMedia('(hover:hover)').matches) return;
  app.querySelectorAll('.hero, .skill, .level-card').forEach(function(el){
    el.addEventListener('mousemove', function(e){
      var r = el.getBoundingClientRect();
      var px = (e.clientX - r.left)/r.width - 0.5;
      var py = (e.clientY - r.top)/r.height - 0.5;
      var maxTilt = el.classList.contains('skill') ? 7 : 4;
      el.style.transform = 'perspective(800px) rotateX('+(-py*maxTilt)+'deg) rotateY('+(px*maxTilt)+'deg) translateY(-2px)';
    });
    el.addEventListener('mouseleave', function(){ el.style.transform = ''; });
  });
}
function byId(id){ return document.getElementById(id); }
function bindClick(id, fn){ var el = byId(id); if(el) el.addEventListener('click', fn); }
function bindEnter(id, fn){ var el = byId(id); if(el) el.addEventListener('keydown', function(e){ if(e.key==='Enter') fn(el.value); }); }

loadState();

})();
</script>
